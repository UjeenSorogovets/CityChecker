# Production: Caddy on 80/443 → api:8080 (internal). Do not publish API port publicly.
#
#   cp .env.example .env   # set DOMAIN=ujeen.pl, ACME_EMAIL, AUTH_JWT_SECRET, …
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up --build -d
#
# DNS: A/AAAA for ujeen.pl and www.ujeen.pl → this host. Open firewall 80/443; block 8080.

services:
  api:
    ports: []
    expose:
      - "8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      App__PublicBaseUrl: ${APP_PUBLIC_BASE_URL:-https://ujeen.pl}
      Cors__AllowedOrigins__0: https://ujeen.pl
      Cors__AllowedOrigins__1: https://www.ujeen.pl
    restart: unless-stopped

  db:
    ports: []
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:-ujeen.pl}
      ACME_EMAIL: ${ACME_EMAIL:-}
      SERVER_IP: ${SERVER_IP:-}
    volumes:
      - ./Caddyfile.prod:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
