# Production: Caddy 80/443 (host Certbot certs) → api:8080 internal.
#
#   cp .env.example .env
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up --build -d
#
# Certs on host: /etc/letsencrypt/live/ujeen.pl/{fullchain.pem,privkey.pem}
# After certbot renew: docker compose … exec caddy caddy reload --config /etc/caddy/Caddyfile

services:
  api:
    ports: !reset []
    expose:
      - "8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      App__PublicBaseUrl: ${APP_PUBLIC_BASE_URL:-https://ujeen.pl}
      Cors__AllowedOrigins__0: https://ujeen.pl
      Cors__AllowedOrigins__1: https://www.ujeen.pl
    restart: unless-stopped

  db:
    ports: !reset []
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:-ujeen.pl}
    volumes:
      - ./Caddyfile.prod:/etc/caddy/Caddyfile:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - api
    restart: unless-stopped
