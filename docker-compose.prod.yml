# Production overlay: TLS via Caddy + Production env for the API.
#
#   export DOMAIN=your.domain.com
#   export ACME_EMAIL=you@example.com
#   docker-compose -f docker-compose.yml -f docker-compose.prod.yml up --build -d
#
# Point DNS A/AAAA for DOMAIN at this host. Open ports 80/443.
# Add https://DOMAIN to Google OAuth Authorized JavaScript origins.
# Optionally firewall host port 8080 so only Caddy is public.

services:
  api:
    environment:
      ASPNETCORE_ENVIRONMENT: Production
    restart: unless-stopped

  db:
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    volumes:
      - ./Caddyfile.prod:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
