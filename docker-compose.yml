services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: citychecker
      POSTGRES_PASSWORD: citychecker
      POSTGRES_DB: citychecker
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U citychecker -d citychecker"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      App__PublicBaseUrl: http://localhost:8080
      ConnectionStrings__Default: Host=db;Port=5432;Database=citychecker;Username=citychecker;Password=citychecker
      Google__ClientId: ${GOOGLE_CLIENT_ID:-YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com}
      Google__AllowedUserId: ${GOOGLE_ALLOWED_USER_ID:-YOUR_GOOGLE_SUB}
      Auth__JwtSecret: ${AUTH_JWT_SECRET:-}
      Nominatim__UserAgent: CityChecker/1.0 (personal; ${CONTACT_EMAIL:-dev@example.com})
      Import__LodzDistrictsCsvPath: /app/DataImports/Granice osiedli.csv
      Import__LodzDistrictsPolygonsPath: /app/DataImports/lodz-osiedla-polygons.json
    volumes:
      - ./DataImports:/app/DataImports:ro
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
